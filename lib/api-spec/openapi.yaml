openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Solo Energia Client Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Client project operations
  - name: documents
    description: Document operations
  - name: notifications
    description: Notification operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects (demo - returns sample data)
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a project
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    Project:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientEmail:
          type: string
        systemPower:
          type: number
          description: System power in kWp
        statusStep:
          type: integer
          description: "Current step: 1=Engenharia, 2=Homologação, 3=Logística, 4=Instalação, 5=Ativação"
        trackingCode:
          type: string
          nullable: true
        trackingCarrier:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        completionPercent:
          type: integer
        estimatedActivation:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - clientName
        - clientEmail
        - systemPower
        - statusStep
        - city
        - state
        - completionPercent
        - createdAt

    Document:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [pending_upload, available_download]
        description:
          type: string
          nullable: true
        fileUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - projectId
        - name
        - type
        - createdAt

    Notification:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - projectId
        - title
        - message
        - read
        - createdAt
